<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>整備士スキル登録</title>

  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      padding: 40px;
    }

    h1 {
      text-align: center;
    }

    .form-container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input:focus {
      outline: none;
      border-color: #4a90e2;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #357abd;
    }

    #message {
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

<h1>整備士スキル登録</h1>

<div class="form-container">

  <div id="message"></div>

  <form id="skillForm">
    <div class="form-group">
      <label for="name">名前</label>
      <input type="text" id="name">
    </div>

<div class="form-group">
  <label for="maker">対応メーカー（複数選択可）</label>
  <select id="maker" multiple size="5">
    <option value="トヨタ">トヨタ</option>
    <option value="日産">日産</option>
    <option value="ホンダ">ホンダ</option>
    <option value="マツダ">マツダ</option>
    <option value="スバル">スバル</option>
    <option value="スズキ">スズキ</option>
    <option value="ダイハツ">ダイハツ</option>
    <option value="その他">その他</option>
  </select>
  <small>Ctrl（Macは⌘）キーを押しながら選択</small>
</div>

    <div class="form-group">
      <label for="carType">対応車種</label>
      <input type="text" id="carType">
    </div>

<div class="form-group">
  <label for="license">資格（複数選択可）</label>
  <select id="license" multiple size="4">
    <option value="1級整備士">1級整備士</option>
    <option value="2級整備士">2級整備士</option>
    <option value="3級整備士">3級整備士</option>
    <option value="車体整備士">車体整備士</option>
    <option value="検査員">検査員</option>
    <option value="なし">なし</option>
  </select>
</div>

    <div class="form-group">
      <label for="experience">経験年数</label>
      <input type="number" id="experience">
    </div>

    <div class="form-group">
      <label for="contact">連絡先</label>
      <input type="email" id="contact">
    </div>

    <button type="submit" id="submitBtn">登録</button>
  </form>

</div>

<script>
/* 複数選択された値をカンマ区切りで取得 */
function getMultiSelectValues(selectId) {
  return Array.from(
    document.getElementById(selectId).selectedOptions
  ).map(option => option.value).join(",");
}

const GAS_URL = "https://script.google.com/macros/s/AKfycbzsq6z295DQwLoei5M_EfbDtW2NExWsVvwGTKIE6MgcAXYhRsxmDLvN4I47hlrzyXKp/exec";

document.getElementById("skillForm").addEventListener("submit", function(e) {
  e.preventDefault(); // ページ遷移を防ぐ

  const data = {
    name: document.getElementById("name").value,
    maker: getMultiSelectValues("maker"),      // 複数選択
    carType: document.getElementById("carType").value,
    license: getMultiSelectValues("license"),  // 複数選択
    experience: document.getElementById("experience").value,
    contact: document.getElementById("contact").value
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("登録が完了しました");
    document.getElementById("skillForm").reset();
  })
  .catch(() => {
    alert("登録に失敗しました");
  });
});
</script>

</body>
</html>
