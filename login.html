<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>
<body>

<h2>ログイン</h2>

<input type="email" id="loginEmail" placeholder="メールアドレス">
<br>
<input type="password" id="loginPassword" placeholder="パスワード">
<br><br>
<button onclick="login()">ログイン</button>

<br><br>
<button onclick="location.href='signup.html'e="color:red;"></p>

<script>
const GAS_URL = "あなたのGASのexec URL";

function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  if (!email || !password) {
    document.getElementById("error").textContent =
      "メールアドレスとパスワードを入力してください";
    return;
  }

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      mode: "login",
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(result => {

    /* =========================
       ✅ ⑥ ログイン後の分岐（ここ）
       ========================= */

    if (!result.ok) {
      document.getElementById("error").textContent =
        "ログインIDまたはパスワードが違います";
      return;
    }

    // 🔵 スキル登録済みの人
    if (result.skillId) {
      location.href = `register.html?id=${result.skillId}`;
    }
    // 🔵 まだスキル未登録の人
    else {
      location.href = "register.html";
    }
  })
  .catch(() => {
    document.getElementById("error").textContent =
      "通信エラーが発生しました";
  });
}
</script>

</body>
</html>
