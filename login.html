<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>
<body>

<h2>ログイン</h2>

<input type="email" id="loginEmail" placeholder="メールアドレス"><br>
<input type="password" id="loginPassword" placeholder="パスワード"><br><br>

<button type="button" id="loginBtn">ログイン</button><br><br>

<button type="button" id="goSignupBtn">新規ユーザー登録</button>

<p id="error" style="color:red;"></p>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzsq6z295DQwLoei5M_EfbDtW2NExWsVvwGTKIE6MgcAXYhRsxmDLvN4I47hlrzyXKp/exec";

document.getElementById("goSignupBtn").addEventListener("click", () => {
  location.href = "signup.html";
});

document.getElementById("loginBtn").addEventListener("click", () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  const error = document.getElementById("error");

  error.textContent = "";

  if (!email || !password) {
    error.textContent = "メールアドレスとパスワードを入力してください";
    return;
  }

  const params = new URLSearchParams({
    mode: "login",
    email: email,
    password: password
  });

  fetch(`${GAS_URL}?${params.toString()}`)
    .then(res => res.text())
    .then(text => {
      if (text === "NG") {
        error.textContent = "ログインIDまたはパスワードが違います";
        return;
      }

      // OK|userId|skillId
      const parts = text.split("|");
      const skillId = parts[2];

      if (skillId) {
        location.href = `register.html?id=${skillId}`;
      } else {
        location.href = "register.html";
      }
    })
    .catch(() => {
      error.textContent = "通信エラーが発生しました";
    });
});
</script>

</body>
</html>
