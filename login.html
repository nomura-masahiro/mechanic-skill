<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>
<body>

<h2>ログイン</h2>

<div>
  <input type="email" id="loginEmail" placeholder="メールアドレス">
</div>

<div>
  <input type="password" id="loginPassword" placeholder="パスワード">
</div>

<br>

<!-- onclick は使わない -->
<button type="button" id="loginBtn">ログイン</button>

<br><br>

<button type="button" onclick="location.href='signup.html'p id="error" style="color:red;"></p>

<script>
const GAS_URL =
  "https://script.google.com/macros/s/AKfycbzsq6z295DQwLoei5M_EfbDtW2NExWsVvwGTKIE6MgcAXYhRsxmDLvN4I47hlrzyXKp/exec";

document.addEventListener("DOMContentLoaded", () => {

  const loginBtn = document.getElementById("loginBtn");
  const error = document.getElementById("error");

  loginBtn.addEventListener("click", () => {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    error.textContent = "";

    if (!email || !password) {
      error.textContent = "メールアドレスとパスワードを入力してください";
      return;
    }

    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        mode: "login",
        email: email,
        password: password
      })
    })
    .then(res => res.json())
    .then(result => {
      if (!result.ok) {
        error.textContent = "ログインIDまたはパスワードが違います";
        return;
      }

      // 🔽 ログイン後の分岐
      if (result.skillId) {
        location.href = `register.html?id=${result.skillId}`;
      } else {
        location.href = "register.html";
      }
    })
    .catch(() => {
      error.textContent = "通信エラーが発生しました";
    });
  });

});
</script>

</body>
</html>
