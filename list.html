<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>整備士一覧</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

<h1>整備士一覧</h1>

<table id="listTable">
  <thead>
    <tr>
      <th>名前</th>
      <th>対応メーカー</th>
      <th>対応車種</th>
      <th>資格</th>
      <th>経験年数</th>
      <th>連絡先</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzsq6z295DQwLoei5M_EfbDtW2NExWsVvwGTKIE6MgcAXYhRsxmDLvN4I47hlrzyXKp/exec"; // ←あなたのURL

fetch(GAS_URL)
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector("#listTable tbody");

    data.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.name || ""}</td>
        <td>${item.maker || ""}</td>
        <td>${item.carType || ""}</td>
        <td>${item.license || ""}</td>
        <td>${item.experience || ""}</td>
        <td>${item.contact || ""}</td>
      `;
      tbody.appendChild(tr);
    });
  })
  .catch(() => {
    alert("一覧データの取得に失敗しました");
  });
</script>

</body>
</html>
