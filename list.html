<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>整備士一覧</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>


<body>
<div id="authArea">
  <h2>整備士一覧（パスワードが必要です）</h2>
  <input type="password" id="listPassword" placeholder="パスワード">
  <button onclick="checkPassword()">表示</button>
  <p id="authError" style="color:red;"></p>
</div>

<div id="listArea" style="display:none;">
  <!-- 既存の一覧テーブルはここに移動 -->
</div>

<h1>整備士一覧</h1>

<table id="listTable">
  <thead>
    <tr>
      <th>名前</th>
      <th>対応メーカー</th>
      <th>対応車種</th>
      <th>資格</th>
      <th>経験年数</th>
      <th>電話番号</th>
      <th>メールアドレス</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzsq6z295DQwLoei5M_EfbDtW2NExWsVvwGTKIE6MgcAXYhRsxmDLvN4I47hlrzyXKp/exec"; // ←あなたのURL

function loadList() {
  fetch(GAS_URL)
    .then(res => res.json())
    .then(data => {
      const tbody = document.querySelector("#listTable tbody");
      tbody.innerHTML = "";

      data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.name}</td>
          <td>${item.maker}</td>
          <td>${item.carType}</td>
          <td>${item.license}</td>
          <td>${item.experience ?? ""}</td>
          <td>${item.phone}</td>
          <td>
            <a href="mailto:${item.email}">
              ?subject=整備のご依頼について
              &body=お世話になっております。整備の件でご相談があります。">
              ${item.email}
            </a>
          </td>
          <td>
            <button onclick="editSkill('${item.id}')">編集</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });
}

function editSkill(id) {
  location.href = `register.html?id=${id}`;
}

function checkPassword() {
  const password = document.getElementById("listPassword").value;

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      mode: "authList",
      password: password
    })
  })
  .then(res => res.text())
  .then(result => {
    if (result === "OK") {
      document.getElementById("authArea").style.display = "none";
      document.getElementById("listArea").style.display = "block";
      loadList();
    } else {
      document.getElementById("authError").textContent =
        "パスワードが違います";
    }
  });
}

</script>

</body>
</html>
